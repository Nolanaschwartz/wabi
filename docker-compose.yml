services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: wabi
      POSTGRES_PASSWORD: wabi-local
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant:v1.18.0
    environment:
      QDRANT__SERVICE__GRPC_PORT: '6334'
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage

  # neo4j graph store for mem0 hybrid graph memory (ADR-0025). Self-controlled container;
  # holds derived personal relationships. APOC is required by mem0's graph store.
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-wabi-local}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data
    # mem0 connects to neo4j at construction and crashes if bolt isn't ready, so gate mem0 on this
    # healthcheck (neo4j cold start is ~20-40s) rather than the bare container-start of depends_on.
    healthcheck:
      test: ['CMD-SHELL', "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-wabi-local} 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  mem0:
    build:
      context: ./infra/mem0
    environment:
      # LLM for memory extraction (self-controlled, OpenAI-compatible). ADR-0017 (amended): the
      # extraction LLM is a personal-data sub-processor, so it stays on the self-controlled tier.
      MEM0_LLM_BASE_URL: ${COACH_BASE_URL}
      MEM0_LLM_MODEL: ${COACH_MODEL}
      MEM0_LLM_API_KEY: ${COACH_API_KEY:-not-needed}
      # Embedder (llama.cpp OpenAI-compatible; lmstudio provider avoids the dimensions= param)
      MEM0_EMBEDDER_BASE_URL: ${EMBEDDING_BASE_URL}/v1
      MEM0_EMBEDDER_MODEL: ${EMBEDDING_MODEL}
      MEM0_EMBEDDER_API_KEY: ${EMBEDDING_API_KEY:-not-needed}
      MEM0_EMBEDDING_DIMS: '768'
      # Vector store: self-hosted Qdrant (host+port; no api_key).
      MEM0_QDRANT_HOST: qdrant
      MEM0_QDRANT_PORT: '6333'
      MEM0_QDRANT_COLLECTION: wabi_memories
      # Graph store: self-controlled neo4j (ADR-0025). Graph memory is enabled because
      # MEM0_GRAPH_PASSWORD is set; unset it to fall back to vector-only.
      MEM0_GRAPH_URL: bolt://neo4j:7687
      MEM0_GRAPH_USERNAME: neo4j
      MEM0_GRAPH_PASSWORD: ${NEO4J_PASSWORD:-wabi-local}
      HISTORY_DB_PATH: /app/history/history.db
    ports:
      - '8081:8081'
    # Gate on neo4j being healthy (not just started); restart as a backstop for transient neo4j
    # blips. If neo4j is permanently down, mem0 stays unavailable and the bot degrades to
    # buffer-only (ADR-0025: neo4j is a hard mem0 dependency).
    restart: on-failure
    depends_on:
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    volumes:
      - mem0_history:/app/history

    

  glitchtip:
    image: glitchtip/glitchtip:latest
    environment:
      DATABASE_URL: postgresql://wabi:wabi-local@postgres:5432/glitchtip
      GLITCHTIP_SECRET_KEY: glitchtip-local-secret-key
      GLITCHTIP_ALLOWED_HOSTS: '*'
      EMAIL_ENABLED: 'false'
    ports:
      - '8000:8000'
    depends_on:
      - postgres

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATABASE_URL: postgresql://wabi:wabi-local@postgres:5432/wabi
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MEM0_URL: http://mem0:8081
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      COACH_BASE_URL: ${COACH_BASE_URL}
      COACH_MODEL: ${COACH_MODEL}
      COACH_API_KEY: ${COACH_API_KEY}
      CLASSIFIER_BASE_URL: ${CLASSIFIER_BASE_URL}
      CLASSIFIER_MODEL: ${CLASSIFIER_MODEL}
      CLASSIFIER_API_KEY: ${CLASSIFIER_API_KEY}
      LANGFUSE_HOST: ${LANGFUSE_HOST}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      TRIAL_DAYS: ${TRIAL_DAYS}
      SENTRY_DSN: ${SENTRY_DSN:-http://admin:password@glitchtip:8000/1}
    depends_on:
      - postgres
      - redis
      - qdrant
      - mem0
      - glitchtip

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: postgresql://wabi:wabi-local@postgres:5432/wabi
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      LUCIA_SECRET: ${LUCIA_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      TRIAL_DAYS: ${TRIAL_DAYS}
      SENTRY_DSN: ${SENTRY_DSN:-http://admin:password@glitchtip:8000/1}
    depends_on:
      - postgres
      - glitchtip
    ports:
      - '3001:3000'

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  mem0_history:
