name: Integration Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:27-dind
        options: --privileged

    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@10.15.1). Passing a
      # `version` here too makes action-setup error with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -F shared db:generate

      # The integration harness imports the real @wabi/shared (dist), so it must be built.
      - run: pnpm -F shared build

      - run: pnpm -F bot test:integration
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
